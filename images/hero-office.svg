<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Room walls and floor -->
  <rect width="1200" height="800" fill="#fdf8f3"/>
  <rect y="590" width="1200" height="210" fill="#ede6dd"/>
  <rect y="580" width="1200" height="18" fill="#e0d8cf"/>

  <!-- Sunlight wash from window -->
  <polygon points="820,0 1200,0 1200,620 620,620" fill="rgba(255,240,190,0.13)"/>

  <!-- Window frame -->
  <rect x="810" y="60" width="340" height="430" rx="6" fill="#e8f4fa"/>
  <rect x="810" y="60" width="340" height="430" rx="6" fill="none" stroke="#d8cfc6" stroke-width="10"/>
  <!-- Window panes -->
  <line x1="980" y1="60" x2="980" y2="490" stroke="#e8e0d8" stroke-width="6"/>
  <line x1="810" y1="272" x2="1150" y2="272" stroke="#e8e0d8" stroke-width="6"/>
  <!-- Sky outside -->
  <rect x="815" y="65" width="161" height="203" fill="#c8e6f4"/>
  <rect x="984" y="65" width="162" height="203" fill="#c8e6f4"/>
  <!-- Cloud -->
  <ellipse cx="870" cy="130" rx="30" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="895" cy="122" rx="22" ry="14" fill="white" opacity="0.85"/>
  <ellipse cx="850" cy="135" rx="20" ry="14" fill="white" opacity="0.85"/>

  <!-- Curtain left -->
  <path d="M800,50 Q780,200 800,350 Q785,460 800,590" fill="none" stroke="#e8c8d4" stroke-width="28" stroke-linecap="round"/>
  <!-- Curtain right -->
  <path d="M1160,50 Q1180,200 1160,350 Q1175,460 1160,590" fill="none" stroke="#e8c8d4" stroke-width="28" stroke-linecap="round"/>

  <!-- Bookshelf -->
  <rect x="40" y="180" width="180" height="400" rx="6" fill="#d8c8b0"/>
  <rect x="40" y="180" width="180" height="12" rx="4" fill="#c8b8a0"/>
  <rect x="40" y="560" width="180" height="12" rx="4" fill="#c8b8a0"/>
  <!-- Shelf dividers -->
  <rect x="40" y="296" width="180" height="8" fill="#c8b8a0"/>
  <rect x="40" y="412" width="180" height="8" fill="#c8b8a0"/>
  <!-- Books row 1 -->
  <rect x="52" y="196" width="18" height="96" rx="2" fill="#c4788a"/>
  <rect x="72" y="210" width="14" height="82" rx="2" fill="#7a8fc8"/>
  <rect x="88" y="200" width="20" height="92" rx="2" fill="#7fad7f"/>
  <rect x="110" y="205" width="16" height="87" rx="2" fill="#f4a261"/>
  <rect x="128" y="196" width="22" height="96" rx="2" fill="#b8a9c9"/>
  <rect x="152" y="208" width="15" height="84" rx="2" fill="#f9c5d1"/>
  <rect x="169" y="198" width="19" height="94" rx="2" fill="#a8d8ea"/>
  <!-- Books row 2 -->
  <rect x="52" y="312" width="22" height="94" rx="2" fill="#f6e8b1"/>
  <rect x="76" y="316" width="14" height="90" rx="2" fill="#c4788a"/>
  <rect x="92" y="308" width="18" height="98" rx="2" fill="#7a8fc8"/>
  <rect x="112" y="320" width="20" height="86" rx="2" fill="#b8a9c9"/>
  <rect x="134" y="312" width="12" height="94" rx="2" fill="#7fad7f"/>
  <rect x="148" y="308" width="24" height="98" rx="2" fill="#f4a261"/>
  <rect x="174" y="318" width="14" height="88" rx="2" fill="#c4788a"/>
  <!-- Books row 3 -->
  <rect x="52" y="428" width="16" height="120" rx="2" fill="#a8d8ea"/>
  <rect x="70" y="420" width="24" height="128" rx="2" fill="#f9c5d1"/>
  <rect x="96" y="432" width="18" height="116" rx="2" fill="#7fad7f"/>
  <rect x="116" y="424" width="14" height="124" rx="2" fill="#f6e8b1"/>
  <rect x="132" y="428" width="20" height="120" rx="2" fill="#b8a9c9"/>
  <rect x="154" y="420" width="16" height="128" rx="2" fill="#7a8fc8"/>
  <rect x="172" y="430" width="18" height="118" rx="2" fill="#c4788a"/>

  <!-- Area rug -->
  <ellipse cx="480" cy="630" rx="380" ry="60" fill="#e8d4c0" opacity="0.75"/>
  <ellipse cx="480" cy="630" rx="345" ry="50" fill="none" stroke="#d8c4b0" stroke-width="5" opacity="0.6"/>
  <ellipse cx="480" cy="630" rx="300" ry="40" fill="none" stroke="#d0bca8" stroke-width="3" opacity="0.4"/>

  <!-- Sofa base -->
  <rect x="180" y="470" width="540" height="140" rx="22" fill="#c8a8be"/>
  <!-- Sofa back -->
  <rect x="180" y="400" width="540" height="92" rx="22" fill="#b898ae"/>
  <!-- Sofa left arm -->
  <rect x="160" y="430" width="42" height="180" rx="18" fill="#b090a6"/>
  <!-- Sofa right arm -->
  <rect x="698" y="430" width="42" height="180" rx="18" fill="#b090a6"/>
  <!-- Cushions -->
  <rect x="190" y="470" width="158" height="128" rx="14" fill="#d8b8ce"/>
  <rect x="361" y="470" width="158" height="128" rx="14" fill="#d8b8ce"/>
  <rect x="532" y="470" width="158" height="128" rx="14" fill="#d8b8ce"/>
  <!-- Cushion lines -->
  <line x1="268" y1="475" x2="268" y2="593" stroke="#c8a8be" stroke-width="2" opacity="0.5"/>
  <line x1="439" y1="475" x2="439" y2="593" stroke="#c8a8be" stroke-width="2" opacity="0.5"/>
  <line x1="610" y1="475" x2="610" y2="593" stroke="#c8a8be" stroke-width="2" opacity="0.5"/>
  <!-- Sofa legs -->
  <rect x="210" y="595" width="18" height="30" rx="5" fill="#906878"/>
  <rect x="672" y="595" width="18" height="30" rx="5" fill="#906878"/>

  <!-- Throw pillow on sofa -->
  <rect x="640" y="430" width="75" height="70" rx="12" fill="#f4a261" opacity="0.85"/>
  <line x1="640" y1="465" x2="715" y2="465" stroke="#e8924f" stroke-width="2" opacity="0.5"/>
  <line x1="677" y1="430" x2="677" y2="500" stroke="#e8924f" stroke-width="2" opacity="0.5"/>

  <!-- Side table -->
  <rect x="750" y="510" width="130" height="85" rx="10" fill="#d4c0a8"/>
  <rect x="800" y="592" width="10" height="28" fill="#c4b098"/>
  <rect x="858" y="592" width="10" height="28" fill="#c4b098"/>

  <!-- Table lamp -->
  <rect x="806" y="470" width="6" height="45" fill="#b09880"/>
  <path d="M790,470 Q808,430 826,470 Z" fill="#f6e8b1"/>
  <ellipse cx="809" cy="470" rx="22" ry="7" fill="#f0dc9a"/>
  <!-- Lamp glow -->
  <ellipse cx="809" cy="455" rx="40" ry="30" fill="rgba(255,240,180,0.2)"/>

  <!-- Large plant -->
  <rect x="60" y="530" width="70" height="70" rx="8" fill="#c8a880"/>
  <rect x="52" y="520" width="86" height="18" rx="6" fill="#b89870"/>
  <!-- Plant stem -->
  <line x1="95" y1="520" x2="95" y2="360" stroke="#7a9a6a" stroke-width="6"/>
  <!-- Leaves -->
  <ellipse cx="95" cy="360" rx="45" ry="80" fill="#7fad6f" transform="rotate(-25 95 360)"/>
  <ellipse cx="60" cy="400" rx="38" ry="72" fill="#6f9d5f" transform="rotate(15 60 400)"/>
  <ellipse cx="130" cy="410" rx="35" ry="68" fill="#8fc07f" transform="rotate(-40 130 410)"/>
  <ellipse cx="95" cy="330" rx="28" ry="55" fill="#7fad6f" transform="rotate(8 95 330)"/>
  <ellipse cx="70" cy="450" rx="25" ry="50" fill="#6f9d5f" transform="rotate(30 70 450)"/>

  <!-- Coffee table / small round table in front of sofa -->
  <ellipse cx="460" cy="640" rx="150" ry="38" fill="#c8b898" opacity="0.9"/>
  <ellipse cx="460" cy="640" rx="150" ry="38" fill="none" stroke="#b8a888" stroke-width="4"/>
  <!-- Table leg -->
  <rect x="448" y="640" width="24" height="20" fill="#b8a888"/>

  <!-- Small decorative items on coffee table -->
  <circle cx="420" cy="635" r="16" fill="#f6e8b1" opacity="0.9"/>
  <rect x="450" y="628" width="35" height="12" rx="3" fill="#b8a9c9" opacity="0.9"/>
  <rect x="450" y="618" width="32" height="10" rx="3" fill="#c4788a" opacity="0.7"/>

  <!-- Framed art on wall -->
  <rect x="380" y="120" width="180" height="140" rx="4" fill="#e8e0d8"/>
  <rect x="380" y="120" width="180" height="140" rx="4" fill="none" stroke="#c8c0b8" stroke-width="8"/>
  <!-- Abstract art inside frame -->
  <circle cx="470" cy="190" r="35" fill="#f9c5d1" opacity="0.7"/>
  <circle cx="450" cy="185" r="25" fill="#b8a9c9" opacity="0.6"/>
  <circle cx="490" cy="200" r="20" fill="#f4a261" opacity="0.5"/>
  <ellipse cx="470" cy="195" rx="50" ry="12" fill="rgba(255,255,255,0.3)"/>
</svg>
